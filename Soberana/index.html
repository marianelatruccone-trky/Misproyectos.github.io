<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión La Soberana - Panel de Control</title>
    <style>
        :root {
            --primary-green: #2f5d50;
            --accent-gold: #c5a059;
            --light-bg: #f4f7f6;
            --white: #ffffff;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light-bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .main-card {
            background: var(--white);
            max-width: 500px;
            width: 100%;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            border-top: 8px solid var(--primary-green);
        }
        .logo-container img {
            max-width: 120px;
            margin-bottom: 20px;
        }
        h1 { color: var(--primary-green); font-size: 24px; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 30px; }
        
        .year-label {
            text-align: left;
            font-size: 11px;
            text-transform: uppercase;
            color: var(--accent-gold);
            font-weight: bold;
            margin: 20px 0 10px 5px;
            letter-spacing: 1px;
        }

        .button-stack { display: flex; flex-direction: column; gap: 12px; }
        .nav-button {
            display: block;
            padding: 15px;
            background-color: var(--white);
            color: var(--primary-green);
            text-decoration: none;
            border: 2px solid var(--primary-green);
            border-radius: 8px;
            font-weight: bold;
            transition: all 0.3s ease;
            text-align: left;
        }
        .nav-button:hover { background-color: var(--primary-green); color: white; transform: translateX(5px); }
        .nav-button.featured { background-color: var(--primary-green); color: white; }
        
        .footer-text { margin-top: 30px; font-size: 12px; color: #999; line-height: 1.6; }
    </style>
</head>
<body>
<div class="main-card">
    <div class="logo-container">
        <img src="https://marianelatruccone-trky.github.io/Misproyectos.github.io/304860792_488549076582091_1628220225548910886_n.jpg" alt="Logo La Soberana">
    </div>
    <h1>Gestión y Resultados</h1>
    <p>Panel de Control Cooperativa La Soberana</p>

    <div class="button-stack">
        <div class="year-label">Ciclo 2026</div>
        
        <a href="https://marianelatruccone-trky.github.io/Misproyectos.github.io/Soberana/Estado%20Resultados%20LS%201er%20trimestre%202026.html" class="nav-button featured">
        📈 Resultados 1er Trimestre 2026
        </a>
        
        <a href="InformeLS%20visita%2004-02-26.html" class="nav-button">
            🤝 Informe de Reunión (04-02-2026)
        </a>
        <a href="InformeLS3%20visita%2013-01-26.html" class="nav-button">
            📝 Informe de Reunión (13-01-2026)
        </a>

        <div class="year-label">Ciclo 2025</div>
        <a href="V2.Estado%20Resultados%20LS%204to%20trim%202025.html" class="nav-button">
            📊 Resultados 4to Trimestre 2025
        </a>
    </div>

    <div class="footer-text">
        Lic. Marianela Truccone<br>
        M.P. RD Nº 54-00083-6
    </div>
</div>
</body>
</html>
